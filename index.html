<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Chess.com Brilliant Move Counter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-2 text-emerald-400">♟️ Live Brilliant Counter</h1>
        <p class="text-sm text-slate-400 text-center mb-6">Fully automated scan of your recent games.</p>

        <div class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1">Chess.com Username</label>
                <input type="text" id="username" placeholder="e.g., MagnusCarlsen" 
                    class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-white">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="yearSelect" class="block text-sm font-medium text-slate-300 mb-1">Year</label>
                    <select id="yearSelect" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-white"></select>
                </div>
                <div>
                    <label for="monthSelect" class="block text-sm font-medium text-slate-300 mb-1">Month</label>
                    <select id="monthSelect" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-white">
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03">March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                        <option value="06">June</option>
                        <option value="07">July</option>
                        <option value="08">August</option>
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>
            </div>
            
            <button id="searchBtn" onclick="autoAnalyzeBrilliants()" 
                class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 shadow-lg shadow-emerald-900/40">
                Scan Automatically
            </button>
        </div>

        <div id="statusContainer" class="mt-4 hidden">
            <div id="statusText" class="text-center text-sm text-slate-400 mb-2">Analyzing...</div>
            <div class="w-full bg-slate-950 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-emerald-400 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <div id="resultCard" class="mt-6 p-6 bg-slate-900 rounded-xl border border-slate-700 text-center hidden">
            <h2 class="text-gray-400 uppercase tracking-wider text-xs font-bold">Total Brilliant Moves</h2>
            <p id="brilliantCount" class="text-5xl font-black text-teal-400 my-2">0</p>
            <p id="gamesAnalyzed" class="text-xs text-slate-500">Across 0 games analyzed</p>
        </div>
    </div>

    <script>
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const currentYear = new Date().getFullYear();
        const currentMonth = String(new Date().getMonth() + 1).padStart(2, '0');

        for (let i = currentYear; i >= 2010; i--) {
            const option = document.createElement('option');
            option.value = i;
            option.text = i;
            yearSelect.appendChild(option);
        }

        yearSelect.value = currentYear;
        monthSelect.value = currentMonth;

        async function autoAnalyzeBrilliants() {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const year = yearSelect.value;
            const month = monthSelect.value;

            const statusContainer = document.getElementById('statusContainer');
            const statusText = document.getElementById('statusText');
            const progressBar = document.getElementById('progressBar');
            const resultCard = document.getElementById('resultCard');
            const countEl = document.getElementById('brilliantCount');
            const gamesEl = document.getElementById('gamesAnalyzed');

            if (!username) {
                alert('Please enter a username');
                return;
            }

            statusContainer.classList.remove('hidden');
            resultCard.classList.add('hidden');
            progressBar.style.width = '0%';
            statusText.innerText = "Accessing game archives...";

            try {
                // Fetch the list of games for the target period
                const response = await fetch(`https://api.chess.com/pub/player/${username}/games/${year}/${month}`);
                if (!response.ok) throw new Error("Could not find data for this player timeframe.");

                const data = await response.json();
                const games = data.games || [];

                if (games.length === 0) {
                    statusContainer.classList.add('hidden');
                    resultCard.classList.remove('hidden');
                    countEl.innerText = "0";
                    gamesEl.innerText = "No games found for this month.";
                    return;
                }

                let brilliantTotal = 0;
                let gamesScanned = 0;

                // Loop through all games asynchronously
                for (let i = 0; i < games.length; i++) {
                    const game = games[i];
                    
                    // Update progress layout visually
                    const pct = Math.round(((i + 1) / games.length) * 100);
                    progressBar.style.width = `${pct}%`;
                    statusText.innerText = `Scanning game ${i + 1} of ${games.length}...`;

                    // Check both raw annotations and standard evaluation patterns automatically
                    if (game.pgn) {
                        const directMatch = game.pgn.match(/!!/g);
                        if (directMatch) brilliantTotal += directMatch.length;

                        const evaluationGlyph = game.pgn.match(/\s\$18\b/g);
                        if (evaluationGlyph) brilliantTotal += evaluationGlyph.length;
                    }
                    
                    gamesScanned++;
                }

                // Smooth out layout update upon complete scan
                statusContainer.classList.add('hidden');
                resultCard.classList.remove('hidden');
                countEl.innerText = brilliantTotal;
                gamesEl.innerText = `Successfully verified across ${gamesScanned} matches.`;

            } catch (err) {
                statusText.innerText = `Error: ${err.message}`;
                progressBar.style.width = '0%';
            }
        }
    </script>
</body>
</html>
